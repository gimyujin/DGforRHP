seed: 42
encoder_name: bert-base-uncased
num_labels: 2

text_col: text
label_col: label
domain_col: domain

use_numeric: true
num_cols: [rating_number, year, month, day]

max_length: 320
batch_size: 32
epochs: 2

lr: 2.0e-5
weight_decay: 0.01
use_amp: true
max_grad_norm: 1.0

#domain_loss_weight: 0.5
#max_grl_lambda: 1.0
#grl_gamma: 10.0

domain_loss_weight: 0.1
max_grl_lambda: 0.1
grl_gamma: 5.0

dropout: 0.1
hidden_num: 128
head_hidden: 256

val_metric: f1_macro
test_metric: f1_macro

paths:
  train: data/train_samples.parquet
  val: data/val_samples.parquet
  test: data/test_samples.parquet

